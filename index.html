<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARYSIG</title>
<link rel="icon" href="data:,">

<style>

body{
background:#0b0b0b;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin:0;
padding:20px;
}

.light{
background:#f4f4f4;
color:#111;
}

h1{
letter-spacing:3px;
}

.container{
max-width:900px;
margin:auto;
border:1px solid #00ff9c;
padding:20px;
box-shadow:0 0 10px #00ff9c;
}

.dropzone{
border:2px dashed #00ff9c;
padding:30px;
margin:15px 0;
cursor:pointer;
}

#hexView{
background:#111;
padding:15px;
margin-top:10px;
max-height:300px;
overflow:auto;
text-align:left;
font-size:13px;
}

.light #hexView{
background:#eee;
}

button,select{
padding:10px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

.hexEdit{
width:40px;
margin:2px;
}

footer{
margin-top:25px;
opacity:0.8;
}

</style>
</head>

<body>

<h1>ARYSIG</h1>

<div class="container">

<div class="dropzone" id="dropzone">
Drop file here or click to upload
<input type="file" id="fileInput" hidden>
</div>

<p id="fileName"></p>

<h3>Detected Type</h3>
<p id="detectedType">Unknown</p>

<h3>Hex Viewer</h3>
<div id="hexView"></div>

<h3>Edit First Bytes</h3>
<div id="hexEditor"></div>

<h3>Change File Signature</h3>

<select id="sigSelect">
<option>PNG</option>
<option>GIF</option>
<option>JPEG</option>
<option>PDF</option>
</select>

<br>

<button onclick="changeSignature()">Apply Signature</button>
<button onclick="downloadFile()">Download File</button>
<button onclick="toggleTheme()">Toggle Theme</button>

</div>

<footer>
Made by Aryan Giri
</footer>

<script>

let originalBuffer
let workingBytes

const signatures = {

PNG:[0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A],
GIF:[0x47,0x49,0x46,0x38,0x39,0x61],
JPEG:[0xFF,0xD8,0xFF],
PDF:[0x25,0x50,0x44,0x46]

}

const knownTypes={
"89504e47":"PNG",
"47494638":"GIF",
"ffd8ff":"JPEG",
"25504446":"PDF"
}

const fileInput=document.getElementById("fileInput")
const dropzone=document.getElementById("dropzone")

dropzone.onclick=()=>fileInput.click()

fileInput.addEventListener("change",loadFile)

dropzone.addEventListener("dragover",e=>e.preventDefault())

dropzone.addEventListener("drop",e=>{
e.preventDefault()
fileInput.files=e.dataTransfer.files
loadFile()
})

function loadFile(){

const file=fileInput.files[0]
if(!file)return

document.getElementById("fileName").innerText=file.name

const reader=new FileReader()

reader.onload=e=>{
originalBuffer=e.target.result
workingBytes=new Uint8Array(originalBuffer)

detectType()
showHex()
createEditor()
}

reader.readAsArrayBuffer(file)

}

function detectType(){

let hex=""

for(let i=0;i<4;i++){
hex+=workingBytes[i].toString(16).padStart(2,"0")
}

let type="Unknown"

for(let sig in knownTypes){

if(hex.startsWith(sig)) type=knownTypes[sig]

}

document.getElementById("detectedType").innerText=type

}

function showHex(){

let output=""

const length=Math.min(workingBytes.length,256)

for(let i=0;i<length;i+=16){

let row=i.toString(16).padStart(8,"0")+"  "

for(let j=0;j<16;j++){

if(i+j<length){

row+=workingBytes[i+j].toString(16).padStart(2,"0")+" "

}

}

output+=row+"\n"

}

document.getElementById("hexView").innerText=output

}

function createEditor(){

const editor=document.getElementById("hexEditor")

editor.innerHTML=""

for(let i=0;i<16;i++){

let input=document.createElement("input")

input.className="hexEdit"
input.value=workingBytes[i].toString(16).padStart(2,"0")

input.onchange=()=>{
workingBytes[i]=parseInt(input.value,16)
showHex()
detectType()
}

editor.appendChild(input)

}

}

function changeSignature(){

const type=document.getElementById("sigSelect").value
const sig=signatures[type]

for(let i=0;i<sig.length;i++){

workingBytes[i]=sig[i]

}

showHex()
detectType()
createEditor()

}

function downloadFile(){

const blob=new Blob([workingBytes])

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="arysig_modified"

a.click()

}

function toggleTheme(){

document.body.classList.toggle("light")

localStorage.setItem("arysigTheme",
document.body.classList.contains("light"))

}

if(localStorage.getItem("arysigTheme")==="true"){

document.body.classList.add("light")

}

</script>

</body>
</html>
